<svg width="640" height="180" viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g stroke="#A3FF12" stroke-width="6" fill="none" filter="url(#glow)">
    <polygon points="60,20 110,45 60,70 10,45"/>
    <polygon points="60,50 110,75 60,100 10,75" opacity="0.9"/>
    <polygon points="60,80 110,105 60,130 10,105" opacity="0.8"/>
    <polygon points="60,110 110,135 60,160 10,135" opacity="0.7"/>
  </g>
  <text x="150" y="105" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700" fill="#FFFFFF" letter-spacing="2">STACK</text>
  <text x="380" y="105" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700" fill="#A3FF12" letter-spacing="2">TERYX</text>
</svg>
